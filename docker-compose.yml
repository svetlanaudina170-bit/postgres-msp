services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres
      MCP_TRANSPORT: sse
      MCP_SERVER_HOST: "0.0.0.0"
      MCP_SERVER_PORT: "8100"
      MCP_MODE: mcp
    volumes:
      - ./connections.json:/app/connections.json
      - ./llm_connections.json:/app/llm_connections.json
    depends_on:
      db:
        condition: service_healthy
    command: ["mcp"]

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7862:7862"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres
      APP_HOST: "0.0.0.0"
      APP_PORT: "7862"
      MCP_MODE: ui
    volumes:
      - ./connections.json:/app/connections.json
      - ./llm_connections.json:/app/llm_connections.json
    depends_on:
      db:
        condition: service_healthy
    command: ["ui"]

volumes:
  pgdata:
